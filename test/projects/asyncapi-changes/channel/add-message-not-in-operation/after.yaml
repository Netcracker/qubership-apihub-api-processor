asyncapi: 3.0.0
info:
  title: Test AsyncAPI
  version: 1.0.0
channels:
  channel1:
    address: channel1
    messages:
      message1:
        $ref: '#/components/messages/message1'
      message2:
        $ref: '#/components/messages/message2'
operations:
  operation1:
    action: receive
    channel:
      $ref: '#/channels/channel1'
    messages:
      - $ref: '#/channels/channel1/messages/message1'
components:
  messages:
    message1:
      payload:
        $ref: '#/components/schemas/Message1Payload'
    message2:
      payload:
        $ref: '#/components/schemas/Message2Payload'
  schemas:
    Message1Payload:
      type: object
      properties:
        userId:
          type: string
    Message2Payload:
      type: object
      properties:
        orderId:
          type: integer
