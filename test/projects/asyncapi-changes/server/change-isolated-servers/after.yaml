asyncapi: 3.0.0
info:
  title: Test AsyncAPI
  version: 1.0.0
servers:
  server1:
    protocol: amqp
    host: new-api1.example.com
  server2:
    protocol: kafka
    host: api2.example.com
channels:
  channel1:
    address: channel1
    servers:
      - $ref: '#/servers/server1'
    messages:
      message1:
        $ref: '#/components/messages/message1'
  channel2:
    address: channel2
    servers:
      - $ref: '#/servers/server2'
    messages:
      message2:
        $ref: '#/components/messages/message2'
operations:
  operation1:
    action: receive
    channel:
      $ref: '#/channels/channel1'
    messages:
      - $ref: '#/channels/channel1/messages/message1'
  operation2:
    action: send
    channel:
      $ref: '#/channels/channel2'
    messages:
      - $ref: '#/channels/channel2/messages/message2'
components:
  messages:
    message1:
      payload:
        type: object
        properties:
          userId:
            type: string
    message2:
      payload:
        type: object
        properties:
          orderId:
            type: string
