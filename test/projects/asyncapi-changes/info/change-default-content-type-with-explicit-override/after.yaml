asyncapi: 3.0.0
info:
  title: Test
  version: 1.0.0
defaultContentType: application/xml
channels:
  channel1:
    address: channel1
    messages:
      message1:
        $ref: '#/components/messages/message1'
  channel2:
    address: channel2
    messages:
      message2:
        $ref: '#/components/messages/message2'
operations:
  operation1:
    action: receive
    channel:
      $ref: '#/channels/channel1'
    messages:
      - $ref: '#/channels/channel1/messages/message1'
  operation2:
    action: receive
    channel:
      $ref: '#/channels/channel2'
    messages:
      - $ref: '#/channels/channel2/messages/message2'
components:
  messages:
    message1:
      contentType: application/json
      payload:
        type: object
        properties:
          userId:
            type: string
    message2:
      payload:
        type: object
        properties:
          orderId:
            type: string
