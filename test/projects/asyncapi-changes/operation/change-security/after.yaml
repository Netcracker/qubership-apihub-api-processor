asyncapi: 3.0.0
info:
  title: Test AsyncAPI
  version: 1.0.0
channels:
  channel1:
    address: channel1
    messages:
      message1:
        $ref: '#/components/messages/message1'
operations:
  operation1:
    action: receive
    channel:
      $ref: '#/channels/channel1'
    security:
      - $ref: '#/components/securitySchemes/api-key'
    messages:
      - $ref: '#/channels/channel1/messages/message1'
components:
  securitySchemes:
    user-password:
      type: userPassword
    api-key:
      type: httpApiKey
      name: api_key
      in: header
  messages:
    message1:
      payload:
        type: object
        properties:
          userId:
            type: string
